name: Continuous Integration Matrix Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Synchronize Automated CI Runner Machine Clock
      # Guarantees absolute temporal agreement for time-series backtests
      run: sudo timedatectl set-timezone UTC

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'
        cache: 'pip'

    - name: Install Monitored Tooling & Production Package
      # Inject the optional test dependency block during the environment build
      run: |
        python -m pip install --upgrade pip
        pip install ".[test]"

    - name: Enforce Deterministic Lint & Style Checks
      run: |
        ruff check .
        black --check .

    - name: Execute Fast Micro-Dimensioned Test Suites
      # Truncated sample fixtures prevent cloud CPU runner queue timeouts
      run: |
        pytest -v --durations=5